<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Folded paper star chart of Canis Major">
  <title>Canis Major — folded paper star chart</title>
  <desc>A cream paper star map with fold creases and a turned corner, the Canis Major constellation printed in rose.</desc>

  <defs>
    <!-- backdrop wash -->
    <linearGradient id="pm-back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf0ec"/>
      <stop offset="1" stop-color="#f5dbd5"/>
    </linearGradient>
    <radialGradient id="pm-backglow" cx="0.5" cy="0.92" r="0.7">
      <stop offset="0" stop-color="#bf524a" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#bf524a" stop-opacity="0"/>
    </radialGradient>

    <!-- paper sheet lighting (top-left bright, bottom-right warm) -->
    <linearGradient id="pm-paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffefc"/>
      <stop offset="0.55" stop-color="#fdf6f1"/>
      <stop offset="1" stop-color="#f4e8e1"/>
    </linearGradient>

    <!-- fold-crease ridge: shadow then highlight (light from upper-left) -->
    <linearGradient id="pm-creaseV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#96605a" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#96605a" stop-opacity="0.14"/>
      <stop offset="0.50" stop-color="#8a5852" stop-opacity="0.20"/>
      <stop offset="0.57" stop-color="#ffffff" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pm-creaseH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#96605a" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#96605a" stop-opacity="0.14"/>
      <stop offset="0.50" stop-color="#8a5852" stop-opacity="0.20"/>
      <stop offset="0.57" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- stronger gradients for the defining cross fold -->
    <linearGradient id="pm-creaseVc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f5852" stop-opacity="0"/>
      <stop offset="0.40" stop-color="#8f5852" stop-opacity="0.20"/>
      <stop offset="0.50" stop-color="#824f49" stop-opacity="0.28"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pm-creaseHc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8f5852" stop-opacity="0"/>
      <stop offset="0.40" stop-color="#8f5852" stop-opacity="0.20"/>
      <stop offset="0.50" stop-color="#824f49" stop-opacity="0.28"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.66"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- turned-corner underside -->
    <linearGradient id="pm-curl" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e7d3ca"/>
      <stop offset="0.55" stop-color="#f3e6df"/>
      <stop offset="1" stop-color="#fbf2ec"/>
    </linearGradient>

    <!-- soft paper grain -->
    <filter id="pm-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.30  0 0 0 0 0.28  0 0 0 0.6 0"/>
    </filter>

    <!-- drop shadow blur -->
    <filter id="pm-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.1"/>
    </filter>

    <!-- pentagon paper outline (bottom-right corner cut for the dog-ear) -->
    <path id="pm-sheet" d="M22 14 H78 V72 L64 86 H22 Z"/>
    <clipPath id="pm-clip"><use href="#pm-sheet"/></clipPath>
    <clipPath id="pm-frameclip"><rect x="26" y="18" width="48" height="64"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect width="100" height="100" fill="url(#pm-back)"/>
  <rect width="100" height="100" fill="url(#pm-backglow)"/>

  <!-- the paper sheet, tilted like a real loose map -->
  <g transform="rotate(-3.2 50 50)">

    <!-- cast shadow -->
    <g filter="url(#pm-soft)">
      <use href="#pm-sheet" fill="#6b3c37" opacity="0.36" transform="translate(0.6 3.0)"/>
    </g>

    <!-- sheet -->
    <use href="#pm-sheet" fill="url(#pm-paper)"/>

    <!-- grain + creases, clipped to the sheet -->
    <g clip-path="url(#pm-clip)">
      <rect x="22" y="14" width="56" height="72" filter="url(#pm-grain)" opacity="0.05"/>

      <!-- secondary quarter folds (8-panel) -->
      <g opacity="0.5">
        <rect x="34.2" y="14" width="3.6" height="72" fill="url(#pm-creaseV)"/>
        <rect x="62.2" y="14" width="3.6" height="72" fill="url(#pm-creaseV)"/>
        <rect x="22" y="30.2" width="56" height="3.6" fill="url(#pm-creaseH)"/>
        <rect x="22" y="66.2" width="56" height="3.6" fill="url(#pm-creaseH)"/>
      </g>

      <!-- the defining cross fold -->
      <rect x="48" y="14" width="4" height="72" fill="url(#pm-creaseVc)"/>
      <rect x="22" y="48" width="56" height="4" fill="url(#pm-creaseHc)"/>
    </g>

    <!-- printed chart: neat-line frame + faint graticule -->
    <g clip-path="url(#pm-clip)">
      <rect x="26" y="18" width="48" height="64" fill="none" stroke="#bf524a" stroke-width="0.7" opacity="0.55"/>
      <rect x="28" y="20" width="44" height="60" fill="none" stroke="#bf524a" stroke-width="0.4" opacity="0.28"/>
      <g clip-path="url(#pm-frameclip)" stroke="#bf524a" stroke-width="0.4" opacity="0.11">
        <line x1="42" y1="18" x2="42" y2="82"/>
        <line x1="58" y1="18" x2="58" y2="82"/>
        <line x1="26" y1="39.3" x2="74" y2="39.3"/>
        <line x1="26" y1="60.7" x2="74" y2="60.7"/>
      </g>
      <!-- corner registration ticks (rose, no text) -->
      <g stroke="#bf524a" stroke-width="0.6" opacity="0.5">
        <path d="M26 22 V18 H30" fill="none"/>
        <path d="M70 18 H74 V22" fill="none"/>
        <path d="M26 78 V82 H30" fill="none"/>
        <path d="M70 82 H74 V78" fill="none"/>
      </g>
    </g>

    <!-- Canis Major, real catalogue geometry, scaled to the sheet -->
    <g clip-path="url(#pm-clip)" transform="translate(50 50) scale(0.86) translate(-50 -50)">
      <g stroke="#bf524a" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round" opacity="0.55" fill="none">
        <line x1="55.5" y1="35.91" x2="47.14" y2="37.01"/>
        <line x1="47.14" y1="37.01" x2="48.52" y2="20.71"/>
        <line x1="47.14" y1="37.01" x2="40.96" y2="32.39"/>
        <line x1="55.5" y1="35.91" x2="72.97" y2="39.94"/>
        <line x1="55.5" y1="35.91" x2="44.28" y2="59.04"/>
        <line x1="44.28" y1="59.04" x2="37.42" y2="67.36"/>
        <line x1="37.42" y1="67.36" x2="45.01" y2="75.74"/>
        <line x1="37.42" y1="67.36" x2="25.19" y2="76.82"/>
        <line x1="45.01" y1="75.74" x2="74.81" y2="79.29"/>
      </g>
      <circle cx="55.5" cy="35.91" r="5.50" fill="#bf524a" opacity="0.12"/>
      <circle cx="45.01" cy="75.74" r="4.40" fill="#bf524a" opacity="0.12"/>
      <g fill="#bf524a" stroke="#fffdfb" stroke-width="0.85">
        <circle cx="55.5" cy="35.91" r="3.5"/>
        <circle cx="72.97" cy="39.94" r="2.23"/>
        <circle cx="40.96" cy="32.39" r="1.44"/>
        <circle cx="48.52" cy="20.71" r="1.45"/>
        <circle cx="47.14" cy="37.01" r="1.34"/>
        <circle cx="44.28" cy="59.04" r="1.84"/>
        <circle cx="37.42" cy="67.36" r="2.28"/>
        <circle cx="45.01" cy="75.74" r="2.4"/>
        <circle cx="25.19" cy="76.82" r="2.05"/>
        <circle cx="74.81" cy="79.29" r="1.84"/>
      </g>
      <!-- Sirius, the Dog Star, four-point spark -->
      <path d="M55.5 28.51 L56.30 35.11 L62.90 35.91 L56.30 36.71 L55.5 43.31 L54.70 36.71 L48.10 35.91 L54.70 35.11 Z" fill="#bf524a" opacity="0.85"/>
    </g>

    <!-- turned-up bottom-right corner (dog-ear) -->
    <path d="M76.4 73.6 L65 85" fill="none" stroke="#6b3c37" stroke-width="1.6" opacity="0.16" filter="url(#pm-soft)"/>
    <path d="M78 72 L64 86 L64 72 Z" fill="url(#pm-curl)"/>
    <path d="M78 72 L64 86" fill="none" stroke="#bf9085" stroke-width="0.55" opacity="0.8"/>
    <path d="M64 86 L64 72" fill="none" stroke="#d9c2b8" stroke-width="0.4" opacity="0.6"/>

    <!-- crisp sheet edge -->
    <use href="#pm-sheet" fill="none" stroke="#7a463f" stroke-width="0.45" opacity="0.28"/>
  </g>
</svg>
