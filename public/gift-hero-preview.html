<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Gift imagery</title>
<style>
  body{margin:0;background:#0d0a14;color:#ececf2;font-family:Georgia,serif;padding:24px}
  h1{font-size:22px;font-weight:400;text-align:center;margin:0 0 6px}
  p{text-align:center;color:#9b93b4;font-size:15px;margin:0 0 28px}
  .card{max-width:960px;margin:0 auto 40px}
  .card img{width:100%;border-radius:14px;display:block}
  .tag{font-size:16px;letter-spacing:.12em;color:#b9a5f0;margin:0 0 10px;text-align:left}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:960px;margin:0 auto 40px}
  .row img{width:100%;border-radius:12px;display:block}
  @media (max-width:700px){.row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<h1>Gift page imagery</h1>
<p>All six rotate in the hero, envelopes lead. Tell me any to redo.</p>
<div class="card"><p class="tag">PARTNER · ENVELOPE</p><img src="/gift-scene-partner-env.webp" alt=""></div>
<div class="card"><p class="tag">FAMILY · ENVELOPE</p><img src="/gift-scene-family-env.webp" alt=""></div>
<div class="card"><p class="tag">FRIEND · ENVELOPE</p><img src="/gift-scene-friend-env.webp" alt=""></div>
<div class="card"><p class="tag">PARTNER · BOX</p><img src="/gift-hero-v2.webp" alt=""></div>
<div class="card"><p class="tag">FAMILY · BOX</p><img src="/gift-scene-family.webp" alt=""></div>
<div class="card"><p class="tag">FRIEND · BOX</p><img src="/gift-scene-friend.webp" alt=""></div>
<p>The four occasion emblems now on the picker cards:</p>
<div class="row">
  <img src="/gift-occ-new.webp" alt=""><img src="/gift-occ-years.webp" alt="">
  <img src="/gift-occ-memorial.webp" alt=""><img src="/gift-occ-birthday.webp" alt="">
</div>
</body>
</html>
