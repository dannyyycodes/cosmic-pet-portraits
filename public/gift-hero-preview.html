<body>
<h1>Pick the gift hero</h1>
<p>Reply A, B or C.</p>
<div class="card on"><p class="tag">A</p><img src="/gift-hero-v2.webp" alt="Candidate A"></div>
<div class="card"><p class="tag">B</p><img src="/gift-hero-alt-b.webp" alt="Candidate B"></div>
