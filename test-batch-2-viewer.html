  .source-card {
    background: #000; border: 1px solid var(--line); border-radius: 8px;

  .source-info .vision { color: var(--muted); font-size: 11px; }
  .results-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  }
  .cell {
    background: #000; border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden; cursor: pointer; transition: transform 120ms;
  }
  .cell:hover { transform: scale(1.02); border-color: var(--rose); }
  .cell img { display: block; width: 100%; aspect-ratio: 4/5; object-fit: cover; }
  .cell-label {
    padding: 6px 10px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--line);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .cell.fail { border-color: #5a1a1a; }
  .cell.fail .placeholder {
    aspect-ratio: 4/5; display: flex; align-items: center; justify-content: center;
    background: #1a0a0a; color: #ff8a8a; font-size: 12px; padding: 16px; text-align: center;
  }
  .multi-row {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 18px; display: grid; gap: 16px;
    grid-template-columns: 1fr 280px;
  }
  @media (max-width: 900px) {
    .multi-row { grid-template-columns: 1fr; }
  }
  .multi-sources { display: flex; gap: 8px; flex-wrap: wrap; }
  .multi-sources img {
    width: 100px; height: 120px; object-fit: cover;
    border: 1px solid var(--line); border-radius: 6px;
  }
  .multi-pet-info { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .multi-pet-info .label { color: var(--ink); font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .multi-result img { width: 100%; aspect-ratio: 4/5; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none;
    align-items: center; justify-content: center; z-index: 100; padding: 20px;

  .lightbox .close {

async function load() {
  try {
    const data = EMBEDDED_DATA;
    document.getElementById('ts').textContent = new Date().toLocaleString();

    const okSingle = data.singleResults.filter(r => r.url).length;
    const okMulti = data.multiResults.filter(r => r.url).length;
    document.getElementById('summary-text').innerHTML =
      `Single-pet: <strong>${okSingle}/${data.singleResults.length}</strong> ✓ — ` +
      `Multi-pet: <strong>${okMulti}/${data.multiResults.length}</strong> ✓ — ` +
      `Cost ≈ $${((okSingle + okMulti) * 0.045).toFixed(2)}`;

    // Single-pet grid
    const singleGrid = document.getElementById('single-grid');
    SOURCES.forEach((src, idx) => {
      const subj = data.breedSubjects[idx];
      const row = document.createElement('div');
      row.className = 'breed-row';
      row.innerHTML = `
        <div class="source-card">
          <img src="${src.url}" alt="${src.name} source" />
          <div class="source-info">
            <div class="breed-name">${src.name}</div>
            <div class="pet-name">"${src.petName}"</div>
            <div class="vision">
              Vision said: <strong style="color:#ddd">${subj.breed || '—'}</strong><br>
              ${subj.furColor || ''}<br>
              ${subj.eyeColor || ''} · ${subj.earShape || ''}<br>
              ${subj.distinguishing || ''}
            </div>
          </div>
        </div>
        <div class="results-grid"></div>
      `;
      const grid = row.querySelector('.results-grid');
      STYLES_ORDER.forEach(styleId => {
        const result = data.singleResults.find(r =>
          r.breed === src.name && r.styleId === styleId
        );
        const cell = document.createElement('div');
        cell.className = 'cell' + (result?.url ? '' : ' fail');
        if (result?.url) {
          cell.innerHTML = `
            <img src="${result.url}" alt="${src.name} ${STYLE_LABELS[styleId]}" loading="lazy" />
            <div class="cell-label">${STYLE_LABELS[styleId]}</div>
          `;
          cell.addEventListener('click', () => openLightbox(result.url));
        } else {
          cell.innerHTML = `
            <div class="placeholder">${STYLE_LABELS[styleId]}<br><br>Failed: ${(result?.error || '?').slice(0, 60)}</div>
            <div class="cell-label">${STYLE_LABELS[styleId]}</div>
          `;
        }
        grid.appendChild(cell);
      });
      singleGrid.appendChild(row);
    });

    // Multi-pet grid
    const multiGrid = document.getElementById('multi-grid');
    data.multiResults.forEach(m => {
      // map names back to source urls
      const srcUrls = m.breeds.map(name => SOURCES.find(s => s.name === name)?.url).filter(Boolean);
      const row = document.createElement('div');
      row.className = 'multi-row';
      const sourceImgs = srcUrls.map((u, i) => `<img src="${u}" alt="" title="${m.names[i]} (${m.breeds[i]})" />`).join('');
      const namesList = m.names.map((n, i) => `${n} (${m.breeds[i]})`).join(', ');
      row.innerHTML = `
        <div>
          <div class="multi-pet-info">
            <div class="label">${m.label} — ${m.style}</div>
            <div>Pets: ${namesList}</div>
          </div>
          <div class="multi-sources" style="margin-top:10px">${sourceImgs}</div>
        </div>
        <div class="multi-result">
          ${m.url
            ? `<img src="${m.url}" alt="${m.label}" />`
            : `<div class="placeholder" style="aspect-ratio:4/5">Failed: ${m.error?.slice(0, 80) || 'fail'}</div>`}
        </div>
      `;
      if (m.url) {
        row.querySelector('.multi-result img').addEventListener('click', () => openLightbox(m.url));
        row.querySelector('.multi-result img').style.cursor = 'pointer';
      }
      multiGrid.appendChild(row);
    });
  } catch (e) {
    document.getElementById('summary-text').textContent = 'Failed to load test-matrix-results.json — make sure it sits next to this HTML file.';
    console.error(e);
  }
}
